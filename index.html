    <style>
        :root {
            --bg-main: #0a0a0c;
            --card-bg: rgba(14, 14, 18, 0.88);
            --border-glow: #333344;
            --neon-blue: #00f0ff;
            --neon-red: #ff3344;
            --y2k-purple: #a855f7;
            --y2k-green: #39ff14;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --spotify-green: #1ed760;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND STAR EFFECT --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Kombinasi Grid Y2K + Dot Bintang */
            background-image: 
                linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px),
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 20px 20px, 20px 20px, 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 0 0, 0 0, 40px 60px, 130px 270px;
            z-index: -1;
            animation: twinkleStars 10s linear infinite;
        }

        @keyframes twinkleStars {
            0% { opacity: 0.8; }
            50% { opacity: 0.5; }
            100% { opacity: 0.8; }
        }

        /* Y2K Downtown OS Window Console Box */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid #22222b;
            padding: 0px; 
            border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(168, 85, 247, 0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
        }

        /* Retro OS Top Window Bar */
        .window-bar {
            background: #16161f;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #22222b;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            color: var(--y2k-purple);
            font-weight: bold;
        }
        .window-dots {
            display: flex;
            gap: 6px;
        }
        .window-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a2a35;
        }
        .window-dot.red { background: var(--neon-red); }
